##### 基本 #####

# default shell
set -g default-shell /bin/bash

# prefix
set -g prefix C-q
unbind C-b

# history
set -g history-limit 100000

# mouse
set -g mouse on

# focus / activity
set -g focus-events on
setw -g monitor-activity on

# timing
set -sg escape-time 10
set -g repeat-time 500


##### Terminal / Color (WSL2) #####

# terminal
set -g default-terminal "tmux-256color"

# terminal overrides (append!)
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -ga terminal-overrides ',*:colors=256'
set -ga terminal-overrides ',*:Tc'


##### Index #####

set -g base-index 1
set -g pane-base-index 1


##### Window / Pane creation (keep cwd) #####

bind c new-window -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'


##### Pane navigation (vim style) #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


##### Pane resize #####

bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3


##### Kill pane #####

bind q kill-pane


##### Copy mode (vim) #####

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# WSL2 clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"


##### zellij-like status / tabs #####

set -g status on
set -g status-interval 1
set -g status-style bg=black,fg=white

# left: session + prefix indicator
set -g status-left "#[fg=green]#S #[fg=yellow]#{?client_prefix,PREFIX ,}"

# windows as tabs
setw -g window-status-format " #[fg=colour245]#I:#W "
setw -g window-status-current-format " #[bg=colour39,fg=black,bold] #I:#W #[default]"

# right: host + time
set -g status-right "#[fg=colour245]#H #[fg=yellow]%Y-%m-%d %H:%M"
set -g status-right-length 40


##### Folder tabs (bookmarks) #####

bind g new-window -n "gh"    -c "$HOME/github.com"
bind p new-window -n "proj"  -c "$HOME/projects"
bind i new-window -n "infra" -c "$HOME/projects/infra"


##### Rename window with current path #####

bind N command-prompt -I "#{pane_current_path}" "rename-window '%%'"

